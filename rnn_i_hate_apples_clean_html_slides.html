<!-- SLIDE 2 -->
<svg class="slide" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RNN setup matrices">
  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="80" y="72" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#172033">Setup: Inputs and Trainable Weights</text>
  <text x="80" y="112" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#627083">These weights are shared across all time steps: t1, t2, and t3.</text>

  <rect x="80" y="160" width="440" height="600" rx="26" fill="#f7f9fc" stroke="#cdd6e1" stroke-width="2"/>
  <text x="118" y="215" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#172033">Input vectors</text>
  <text x="118" y="275" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#172033">x₁ = “I”</text>
  <text x="188" y="316" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#e8802d">[1, 0, 0]ᵀ</text>
  <text x="118" y="385" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#172033">x₂ = “hate”</text>
  <text x="188" y="426" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#e8802d">[0, 1, 0]ᵀ</text>
  <text x="118" y="495" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#172033">x₃ = “apples”</text>
  <text x="188" y="536" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#e8802d">[0, 0, 1]ᵀ</text>
  <rect x="118" y="610" width="360" height="92" rx="18" fill="#fff1e3" stroke="#e8802d" stroke-width="2"/>
  <text x="298" y="648" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#172033">One-hot input</text>
  <text x="298" y="680" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#627083">selects one column of Wₓ</text>

  <rect x="570" y="160" width="460" height="600" rx="26" fill="#f7f9fc" stroke="#cdd6e1" stroke-width="2"/>
  <text x="608" y="215" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#172033">Input weights Wₓ</text>
  <text x="608" y="258" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#627083">shape = 2×3</text>
  <text x="675" y="325" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#627083">I        hate    apples</text>
  <text x="645" y="383" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" fill="#172033">[ 0.2   -1.0    0.1 ]</text>
  <text x="645" y="437" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" fill="#172033">[ 0.1   -0.8    0.4 ]</text>
  <rect x="625" y="525" width="350" height="128" rx="18" fill="#e8f2ff" stroke="#3470cc" stroke-width="2"/>
  <text x="800" y="566" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#172033">Wₓ maps input → hidden</text>
  <text x="800" y="605" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#172033">(2×3)(3×1) = 2×1</text>

  <rect x="1080" y="160" width="440" height="600" rx="26" fill="#f7f9fc" stroke="#cdd6e1" stroke-width="2"/>
  <text x="1118" y="215" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#172033">Recurrent weights Wₕ</text>
  <text x="1118" y="258" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#627083">shape = 2×2</text>
  <text x="1162" y="365" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#172033">[ 0.5    0.1 ]</text>
  <text x="1162" y="427" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#172033">[ 0.2    0.4 ]</text>
  <rect x="1130" y="525" width="340" height="128" rx="18" fill="#eaf9ee" stroke="#439d5b" stroke-width="2"/>
  <text x="1300" y="566" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#172033">Wₕ maps old h → new h</text>
  <text x="1300" y="605" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#172033">(2×2)(2×1) = 2×1</text>

  <rect x="80" y="795" width="1440" height="54" rx="18" fill="#fff8e7" stroke="#e6c66d" stroke-width="2"/>
  <text x="800" y="830" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#172033">Important: Wₓ and Wₕ are trainable, but they do not change during t1 → t2 → t3. They update after loss + backpropagation.</text>
</svg>

<!-- SLIDE 3 -->
<svg class="slide" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RNN time step 1">
  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="80" y="72" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#172033">Time Step 1: word = “I”</text>
  <text x="80" y="112" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#627083">Initial memory is zero: h₀ = [0, 0]ᵀ</text>

  <rect x="80" y="155" width="1440" height="94" rx="22" fill="#fff8e7" stroke="#e6c66d" stroke-width="3"/>
  <text x="800" y="214" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#172033">h₁ = tanh( Wₓx₁ + Wₕh₀ + b )</text>

  <rect x="80" y="295" width="430" height="360" rx="26" fill="#f7f9fc" stroke="#cdd6e1" stroke-width="2"/>
  <text x="120" y="350" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#172033">Current word effect</text>
  <text x="120" y="410" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#172033">x₁ = [1, 0, 0]ᵀ</text>
  <text x="120" y="470" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#e8802d">Wₓx₁ = [0.2, 0.1]ᵀ</text>
  <text x="120" y="545" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#627083">Because one-hot x₁ selects the</text>
  <text x="120" y="575" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#627083">first column of Wₓ.</text>

  <rect x="585" y="295" width="430" height="360" rx="26" fill="#f7f9fc" stroke="#cdd6e1" stroke-width="2"/>
  <text x="625" y="350" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#172033">Previous memory effect</text>
  <text x="625" y="410" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#172033">h₀ = [0, 0]ᵀ</text>
  <text x="625" y="470" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#3470cc">Wₕh₀ = [0, 0]ᵀ</text>
  <text x="625" y="545" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#627083">No previous information exists yet.</text>

  <rect x="1090" y="295" width="430" height="360" rx="26" fill="#f7f9fc" stroke="#cdd6e1" stroke-width="2"/>
  <text x="1130" y="350" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#172033">Add and apply tanh</text>
  <text x="1130" y="410" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#172033">sum = [0.2, 0.1]ᵀ</text>
  <text x="1130" y="470" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#172033">h₁ = tanh(sum)</text>
  <text x="1130" y="535" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#439d5b">h₁ ≈ [0.197, 0.100]ᵀ</text>

  <rect x="160" y="720" width="1280" height="82" rx="24" fill="#eaf9ee" stroke="#439d5b" stroke-width="2"/>
  <text x="800" y="772" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#172033">Meaning: after reading “I”, the RNN has a small 2-value hidden memory.</text>
</svg>

<!-- SLIDE 4 -->
<svg class="slide" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RNN time step 2">
  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="80" y="72" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#172033">Time Step 2: word = “hate”</text>
  <text x="80" y="112" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#627083">Now the RNN uses the current word plus previous hidden state h₁.</text>

  <rect x="80" y="155" width="1440" height="94" rx="22" fill="#fff8e7" stroke="#e6c66d" stroke-width="3"/>
  <text x="800" y="214" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#172033">h₂ = tanh( Wₓx₂ + Wₕh₁ + b )</text>

  <rect x="80" y="295" width="430" height="400" rx="26" fill="#f7f9fc" stroke="#cdd6e1" stroke-width="2"/>
  <text x="120" y="350" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#172033">Current word effect</text>
  <text x="120" y="410" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#172033">x₂ = [0, 1, 0]ᵀ</text>
  <text x="120" y="470" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#e8802d">Wₓx₂ = [-1.0, -0.8]ᵀ</text>
  <text x="120" y="545" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#627083">One-hot x₂ selects the second</text>
  <text x="120" y="575" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#627083">column of Wₓ: the “hate” column.</text>

  <rect x="585" y="295" width="430" height="400" rx="26" fill="#f7f9fc" stroke="#cdd6e1" stroke-width="2"/>
  <text x="625" y="350" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#172033">Previous memory effect</text>
  <text x="625" y="410" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#172033">h₁ ≈ [0.197, 0.100]ᵀ</text>
  <text x="625" y="472" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#172033">row 1: 0.5(0.197)+0.1(0.100)</text>
  <text x="720" y="508" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#172033">= 0.1085</text>
  <text x="625" y="560" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#172033">row 2: 0.2(0.197)+0.4(0.100)</text>
  <text x="720" y="596" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#172033">= 0.0794</text>
  <text x="625" y="650" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#3470cc">Wₕh₁ = [0.1085, 0.0794]ᵀ</text>

  <rect x="1090" y="295" width="430" height="400" rx="26" fill="#f7f9fc" stroke="#cdd6e1" stroke-width="2"/>
  <text x="1130" y="350" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#172033">Add and apply tanh</text>
  <text x="1130" y="410" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#172033">sum = [-0.8915, -0.7206]ᵀ</text>
  <text x="1130" y="470" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#172033">h₂ = tanh(sum)</text>
  <text x="1130" y="535" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#c44646">h₂ ≈ [-0.712, -0.617]ᵀ</text>
  <text x="1130" y="608" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#627083">The word “hate” strongly pushes</text>
  <text x="1130" y="638" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#627083">the hidden memory negative.</text>

  <rect x="160" y="745" width="1280" height="82" rx="24" fill="#ffeded" stroke="#c44646" stroke-width="2"/>
  <text x="800" y="797" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#172033">Meaning: after “I hate”, the hidden state stores strong negative sentiment.</text>
</svg>

<svg class="slide" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RNN time step 3 and output">
  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="80" y="72" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#172033">Time Step 3: word = “apples” + Final Output</text>
  <text x="80" y="112" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#627083">The final hidden state h₃ is used for sentiment classification.</text>

  <rect x="80" y="155" width="1440" height="94" rx="22" fill="#fff8e7" stroke="#e6c66d" stroke-width="3"/>
  <text x="800" y="214" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#172033">h₃ = tanh( Wₓx₃ + Wₕh₂ + b )</text>

  <text x="120" y="470" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#e8802d">Wₓx₃ = [0.1, 0.4]ᵀ</text>
  <text x="120" y="545" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#627083">This selects the “apples” column</text>

  <text x="625" y="350" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#172033">Previous memory effect</text>
  <text x="625" y="410" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#172033">h₂ ≈ [-0.712, -0.617]ᵀ</text>

  <text x="625" y="520" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#172033">row 2 = -0.3892</text>

<svg class="slide" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RNN trainable parameters">
  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="80" y="72" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#172033">Which Parts Are Trainable?</text>
  <text x="80" y="112" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#627083">Weights are learned. Hidden states are computed during the forward pass.</text>

  <rect x="80" y="160" width="455" height="555" rx="26" fill="#f7f9fc" stroke="#cdd6e1" stroke-width="2"/>

  <text x="178" y="285" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#172033">input weights</text>
  <text x="118" y="355" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#3470cc">Wₕ</text>
  <text x="178" y="355" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#172033">recurrent weights</text>
  <text x="118" y="425" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#439d5b">b</text>
  <text x="178" y="425" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#172033">RNN bias</text>
  <text x="118" y="495" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#7358be">Wᵧ, bᵧ</text>
  <text x="240" y="495" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#172033">output layer</text>

  <text x="300" y="623" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#172033">These change during training.</text>

  <rect x="575" y="160" width="455" height="555" rx="26" fill="#f7f9fc" stroke="#cdd6e1" stroke-width="2"/>
  <text x="613" y="215" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#172033">Not trainable parameters</text>
  <text x="613" y="285" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#3470cc">h₁, h₂, h₃</text>
  <text x="613" y="327" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#172033">hidden states / activations</text>
  <text x="613" y="405" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#172033">They are calculated from:</text>
  <text x="655" y="465" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#172033">xₜ, hₜ₋₁, Wₓ, Wₕ, b</text>

  <text x="795" y="623" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#172033">These change for each input.</text>

  <rect x="1070" y="160" width="450" height="555" rx="26" fill="#f7f9fc" stroke="#cdd6e1" stroke-width="2"/>
  <text x="1108" y="215" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#172033">When do weights update?</text>
  <text x="1108" y="280" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#172033">1. Forward pass</text>
  <text x="1145" y="318" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#627083">x₁ → h₁ → h₂ → h₃ → prediction</text>
  <text x="1108" y="380" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#172033">2. Compute loss</text>
  <text x="1108" y="455" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#172033">3. Backpropagation through time</text>
  <text x="1108" y="530" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#172033">4. Optimizer updates weights</text>
  <rect x="1108" y="610" width="360" height="76" rx="18" fill="#ffeded" stroke="#c44646" stroke-width="2"/>
  <text x="1288" y="648" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#172033">Not after each hidden state.</text>
  <text x="1288" y="676" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#627083">Usually after each batch.</text>

  <rect x="80" y="775" width="1440" height="66" rx="20" fill="#fff8e7" stroke="#e6c66d" stroke-width="2"/>
  <text x="800" y="817" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#172033">Compile prepares the optimizer/loss; fit() performs training and updates Wₓ, Wₕ, b.</text>
